services:
  # PostgreSQL Database - Immutable
  postgres:
    image: postgres:15-alpine
    container_name: lux-auto-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - lux-auto-network

  # Redis Cache - Immutable
  redis:
    image: redis:7-alpine
    container_name: lux-auto-redis
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - lux-auto-network

  # Lux-Auto Production Instance 1 (25% capacity)
  lux-auto-prod-1:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - ENV=production
    image: lux-auto:${APP_VERSION:-latest}
    container_name: lux-auto-app-prod-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/lux_auto
      FASTAPI_SECRET_KEY: ${FASTAPI_SECRET_KEY:-change-me-in-production}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: "false"
      PROMETHEUS_ENABLED: "true"
      APP_ENV: production
      INSTANCE_ID: prod-1
    ports:
      - "8889:8000"
      - "9889:9090"
    volumes:
      - ./logs/prod-1:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - lux-auto-network
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Lux-Auto Production Instance 2 (50% capacity)
  lux-auto-prod-2:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - ENV=production
    image: lux-auto:${APP_VERSION:-latest}
    container_name: lux-auto-app-prod-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/lux_auto
      FASTAPI_SECRET_KEY: ${FASTAPI_SECRET_KEY:-change-me-in-production}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: "false"
      PROMETHEUS_ENABLED: "true"
      APP_ENV: production
      INSTANCE_ID: prod-2
    ports:
      - "8890:8000"
      - "9890:9090"
    volumes:
      - ./logs/prod-2:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - lux-auto-network
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Lux-Auto Production Instance 3 (75-100% capacity)
  lux-auto-prod-3:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - ENV=production
    image: lux-auto:${APP_VERSION:-latest}
    container_name: lux-auto-app-prod-3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/lux_auto
      FASTAPI_SECRET_KEY: ${FASTAPI_SECRET_KEY:-change-me-in-production}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: "false"
      PROMETHEUS_ENABLED: "true"
      APP_ENV: production
      INSTANCE_ID: prod-3
    ports:
      - "8891:8000"
      - "9891:9090"
    volumes:
      - ./logs/prod-3:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - lux-auto-network
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  lux-auto-network:
    driver: bridge
