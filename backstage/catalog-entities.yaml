## Catalog Database Setup

The Backstage catalog is stored in the PostgreSQL database. To initialize:

```sql
-- Create Backstage entities table
CREATE TABLE IF NOT EXISTS catalog_entities (
    id UUID PRIMARY KEY,
    entity_ref VARCHAR(255) UNIQUE NOT NULL,
    kind VARCHAR(50) NOT NULL,
    namespace VARCHAR(50) NOT NULL,
    name VARCHAR(255) NOT NULL,
    metadata JSONB NOT NULL,
    spec JSONB NOT NULL,
    relations JSONB,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    INDEX idx_kind_namespace (kind, namespace),
    INDEX idx_entity_ref (entity_ref)
);

-- Create catalog relationships table
CREATE TABLE IF NOT EXISTS catalog_relations (
    source_entity_ref VARCHAR(255) NOT NULL,
    target_entity_ref VARCHAR(255) NOT NULL,
    type VARCHAR(50) NOT NULL,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    PRIMARY KEY (source_entity_ref, target_entity_ref, type),
    FOREIGN KEY (source_entity_ref) REFERENCES catalog_entities(entity_ref),
    FOREIGN KEY (target_entity_ref) REFERENCES catalog_entities(entity_ref)
);
```

