## Importing Entities into Backstage

### Option 1: Manual YAML Registration

1. Access Backstage at `https://backstage.lux.kushnir.cloud`
2. Go to **Create** → **Register Entity**
3. Paste YAML entity definition
4. Click **Analyze**
5. Click **Import** to register

### Option 2: GitHub Integration

1. Create `catalog-info.yaml` in repository root
2. Configure GitHub token in Backstage
3. Add repository URL in **Settings** → **Integrations**
4. Entities are auto-registered

### Option 3: Bulk Import

1. Prepare YAML files in `/catalog/entities/` directory
2. Run migration:
   ```bash
   docker exec lux-backstage \
     backstage-cli catalog:load --directory /catalog/entities
   ```

