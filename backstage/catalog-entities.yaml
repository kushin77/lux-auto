# Backstage Service Catalog Configuration

Backstage is the developer and operations platform for Lux-Auto. It provides:
- **Service Catalog**: Discover and manage all services
- **API Catalog**: Browse available APIs
- **Component Ownership**: Track owners and dependencies
- **Operational Dashboards**: Monitor system health
- **Scaffolder**: Create standardized services
- **Tech Docs**: Centralized documentation

---

## Entity Registration

### APIs

#### REST APIs

```yaml
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: lux-deals-api
  namespace: default
  title: Deals API
  description: REST API for deal management
spec:
  type: openapi
  owner: team-backend
  lifecycle: production
  definition: |
    openapi: 3.0.0
    info:
      title: Deals API v2
      version: 2.0.0
      description: API for creating, reading, updating, and managing vehicle deals
    servers:
      - url: https://lux.kushnir.cloud/api/v2
    paths:
      /deals:
        get:
          summary: List all deals
          parameters:
            - name: status
              in: query
              schema:
                type: string
                enum: [new, reviewing, approved, rejected]
            - name: page
              in: query
              schema:
                type: integer
            - name: per_page
              in: query
              schema:
                type: integer
          responses:
            '200':
              description: List of deals
        post:
          summary: Create a new deal
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    vin:
                      type: string
                    year:
                      type: integer
                    make:
                      type: string
                    model:
                      type: string
          responses:
            '201':
              description: Deal created
      /deals/{id}:
        get:
          summary: Get deal details
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
          responses:
            '200':
              description: Deal details
        put:
          summary: Update deal
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
          responses:
            '200':
              description: Deal updated
        delete:
          summary: Delete deal
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
          responses:
            '204':
              description: Deal deleted

