## Database Migration Template

```yaml
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: database-migration
  title: Create Database Migration
  description: Generate a new database migration file with Alembic
  tags:
    - database
    - migration
    - devops
spec:
  owner: team-devops
  type: other
  parameters:
    - title: Migration Details
      required:
        - migration_name
        - service
      properties:
        service:
          title: Service
          type: string
          description: Which service needs this migration?
          enum:
            - lux-fastapi-backend
            - other-service
        migration_name:
          title: Migration Name
          type: string
          description: "Describe the change (e.g., add-deals-table, add-user-roles)"
          pattern: "^[a-z0-9-]+$"
        description:
          title: Description
          type: string
          description: Detailed description of database changes
        is_breaking:
          title: Breaking Change
          type: boolean
          description: Does this migration require downtime?
          default: false
  steps:
    - id: generate-migration
      name: Generate Migration File
      action: debug:log
      input:
        message: "Generating migration: ${{ parameters.migration_name }}"
    - id: create-migration
      name: Create Migration
      action: fetch:template
      input:
        url: ./templates/alembic-migration
        values:
          migration_name: ${{ parameters.migration_name }}
          description: ${{ parameters.description }}
          timestamp: ${{ now() }}
  output:
    links:
      - title: Migration File
        url: "migrations/alembic/${{ parameters.migration_name }}.py"

