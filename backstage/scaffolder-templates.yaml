# Backstage Scaffolder Templates

Scaffolder templates in Backstage help teams create standardized services, components, and configurations.

---

## Python API Service Template

```yaml
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: python-api-service
  title: Python API Service
  description: Create a new Python (FastAPI/Flask) API service with standard structure
  tags:
    - python
    - api
    - service
spec:
  owner: team-backend
  type: service
  parameters:
    - title: Service Information
      required:
        - name
        - owner
      properties:
        name:
          title: Service Name
          type: string
          description: "Unique name for the service (e.g., inventory-api, billing-service)"
          pattern: "^[a-z][a-z0-9-]*$"
        description:
          title: Description
          type: string
          description: What does this service do?
        owner:
          title: Team/Owner
          type: string
          enum:
            - team-backend
            - team-platform
    - title: Technology Stack
      required:
        - framework
        - python_version
      properties:
        framework:
          title: Framework
          type: string
          description: Web framework to use
          enum:
            - fastapi
            - flask
        python_version:
          title: Python Version
          type: string
          enum:
            - "3.11"
            - "3.12"
        include_postgres:
          title: Include PostgreSQL Support
          type: boolean
          default: true
        include_redis:
          title: Include Redis Cache
          type: boolean
          default: false
    - title: Integration & Deployment
      properties:
        with_tests:
          title: Include Unit Tests
          type: boolean
          default: true
        with_docs:
          title: Include API Documentation
          type: boolean
          default: true
        github_repo:
          title: GitHub Repository URL
          type: string
          description: "Leave empty to create new repo at kushin77/[service-name]"
  steps:
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./templates/python-api-base
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          framework: ${{ parameters.framework }}
          python_version: ${{ parameters.python_version }}
    - id: fetch-postgres
      if: ${{ parameters.include_postgres }}
      name: Fetch PostgreSQL Integration
      action: fetch:template
      input:
        url: ./templates/postgres-integration
    - id: fetch-redis
      if: ${{ parameters.include_redis }}
      name: Fetch Redis Integration
      action: fetch:template
      input:
        url: ./templates/redis-integration
    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        allowedHosts:
          - github.com
        description: ${{ parameters.description }}
        repoUrl: github.com?owner=kushin77&repo=${{ parameters.name }}
    - id: register
      name: Register in Backstage Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: GitHub Repository
        url: ${{ steps.publish.output.repoUrl }}
      - title: Service Catalog
        url: https://backstage.lux.kushnir.cloud/catalog/default/service/${{ parameters.name }}

