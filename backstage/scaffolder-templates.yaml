## Docker Configuration Template

```yaml
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: docker-configuration
  title: Docker Configuration
  description: Generate Dockerfile and docker-compose configuration
  tags:
    - docker
    - devops
    - infrastructure
spec:
  owner: team-devops
  type: other
  parameters:
    - title: Service Details
      required:
        - service_name
        - base_image
      properties:
        service_name:
          title: Service Name
          type: string
        base_image:
          title: Base Image
          type: string
          enum:
            - python:3.11-alpine
            - python:3.11
            - node:18-alpine
            - golang:1.21-alpine
        expose_port:
          title: Expose Port
          type: number
          default: 8000
        include_healthcheck:
          title: Include Health Check
          type: boolean
          default: true
  steps:
    - id: fetch-docker
      name: Generate Docker Files
      action: fetch:template
      input:
        url: ./templates/docker-config
        values:
          service_name: ${{ parameters.service_name }}
          base_image: ${{ parameters.base_image }}
          expose_port: ${{ parameters.expose_port }}
          include_healthcheck: ${{ parameters.include_healthcheck }}
  output:
    links:
      - title: Dockerfile
        url: Dockerfile
      - title: docker-compose.yml
        url: docker-compose.yml

