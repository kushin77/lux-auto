## Monitoring Dashboard Template

```yaml
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: monitoring-dashboard
  title: Create Monitoring Dashboard
  description: Generate Grafana dashboard configuration for your service
  tags:
    - monitoring
    - observability
    - operations
spec:
  owner: team-devops
  type: other
  parameters:
    - title: Dashboard Details
      required:
        - service_name
        - metrics_type
      properties:
        service_name:
          title: Service Name
          type: string
          description: Name of service to monitor
        dashboard_title:
          title: Dashboard Title
          type: string
          description: Display title for dashboard
        metrics_type:
          title: Metrics Type
          type: string
          enum:
            - API Performance
            - Database
            - Cache
            - Business Metrics
            - Resource Usage
        include_alerts:
          title: Include Alert Rules
          type: boolean
          default: true
  steps:
    - id: fetch-dashboard
      name: Generate Dashboard
      action: fetch:template
      input:
        url: ./templates/grafana-dashboard
        values:
          service_name: ${{ parameters.service_name }}
          dashboard_title: ${{ parameters.dashboard_title }}
          metrics_type: ${{ parameters.metrics_type }}
          include_alerts: ${{ parameters.include_alerts }}
  output:
    links:
      - title: Dashboard JSON
        url: "dashboards/grafana-${{ parameters.service_name }}.json"

