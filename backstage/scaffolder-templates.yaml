## Advanced Configuration

### Custom Actions

Create custom Scaffolder actions for Lux-Auto-specific tasks:

```yaml
# example-custom-action.js
module.exports = {
  id: 'custom:notify-team',
  description: 'Send Slack notification to team',
  async handler(ctx) {
    const { slackWebhook, message } = ctx.input;
    // Implementation...
  }
};
```

### Template Variables

Available variables in templates:
- `${{ parameters.* }}` - User input parameters
- `${{ steps.*.output.* }}` - Step outputs
- `${{ now() }}` - Current timestamp
- `${{ uuid() }}` - Generate UUID

### Conditional Steps

Execute steps based on parameters:
```yaml
- id: conditional-step
  if: ${{ parameters.include_postgres }}
  action: fetch:template
  input:
    url: ./templates/postgres
```

