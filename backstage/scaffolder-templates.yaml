## Integration Test Suite Template

```yaml
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: integration-tests
  title: Integration Test Suite
  description: Generate integration tests for API services
  tags:
    - testing
    - qa
    - ci-cd
spec:
  owner: team-backend
  type: other
  parameters:
    - title: Test Configuration
      required:
        - api_endpoint
        - test_framework
      properties:
        api_endpoint:
          title: API Endpoint
          type: string
          description: "e.g., https://api.service.local"
        test_framework:
          title: Test Framework
          type: string
          enum:
            - pytest
            - unittest
            - jest
        include_load_tests:
          title: Include Load Tests
          type: boolean
          default: false
        include_security_tests:
          title: Include Security Tests
          type: boolean
          default: true
  steps:
    - id: fetch-tests
      name: Generate Test Files
      action: fetch:template
      input:
        url: ./templates/integration-tests
        values:
          api_endpoint: ${{ parameters.api_endpoint }}
          test_framework: ${{ parameters.test_framework }}
          include_load_tests: ${{ parameters.include_load_tests }}
          include_security_tests: ${{ parameters.include_security_tests }}
  output:
    links:
      - title: Test Suite
        url: tests/integration/

