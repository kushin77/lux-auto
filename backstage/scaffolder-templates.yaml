## Using Scaffolder Templates

### Step 1: Access Scaffolder

1. Go to Backstage: `https://backstage.lux.kushnir.cloud`
2. Click **Create** (top navigation)
3. Browse available templates

### Step 2: Fill in Parameters

1. Select a template (e.g., "Python API Service")
2. Fill out the required fields
3. Review the template preview
4. Click **Review** to see what will be created

### Step 3: Create Service

1. Click **Create** to execute the template
2. Scaffolder will:
   - Generate files from template
   - Create GitHub repository
   - Register in Backstage catalog
   - Create initial infrastructure
3. View output links to access new service

### Step 4: Next Steps

After creation:
1. Clone the new repository
2. Install dependencies
3. Configure CI/CD pipelines
4. Deploy to staging environment
5. Register additional documentation

