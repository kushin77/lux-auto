## API Documentation Template

```yaml
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: api-documentation
  title: Create API Documentation
  description: Generate OpenAPI/AsyncAPI documentation for your service
  tags:
    - documentation
    - api
spec:
  owner: team-frontend
  type: other
  parameters:
    - title: API Information
      required:
        - api_name
        - api_version
      properties:
        api_name:
          title: API Name
          type: string
          description: Name of the API
        api_version:
          title: API Version
          type: string
          enum:
            - "1.0"
            - "2.0"
            - "3.0"
        api_type:
          title: API Type
          type: string
          enum:
            - REST
            - GraphQL
            - WebSocket
            - gRPC
        base_path:
          title: Base Path
          type: string
          description: "e.g., /api/v2"
        auth_type:
          title: Authentication
          type: string
          enum:
            - Bearer Token
            - API Key
            - OAuth2
            - None
  steps:
    - id: fetch-docs
      name: Fetch Documentation Template
      action: fetch:template
      input:
        url: ./templates/api-docs
        values:
          api_name: ${{ parameters.api_name }}
          api_version: ${{ parameters.api_version }}
          api_type: ${{ parameters.api_type }}
          base_path: ${{ parameters.base_path }}
          auth_type: ${{ parameters.auth_type }}
  output:
    links:
      - title: OpenAPI Spec
        url: "docs/openapi.yaml"

