## Best Practices

### Template Development

- **Keep templates simple**: Focus on one task per template
- **Use sensible defaults**: Minimize required parameters
- **Provide examples**: Show output and expected results
- **Test thoroughly**: Test template before publishing
- **Document clearly**: Include description and usage examples

### Naming Conventions

Services:
```
[team]-[function]-[type]
Examples: inventory-api, user-service, billing-worker
```

Templates:
```
[technology]-[component]-[feature]
Examples: python-api-service, docker-configuration, aws-lambda-function
```

### Security Best Practices

- Never include secrets in templates
- Use environment variables for sensitive data
- Implement validation in template parameters
- Audit template usage
- Rotate API keys regularly

---

## Troubleshooting

### Template Not Appearing

1. Check template YAML syntax: `yamllint template.yaml`
2. Verify template is registered in Backstage catalog
3. Restart Backstage service
4. Clear browser cache

### Execution Fails

1. Check Backstage logs: `docker logs lux-backstage`
2. Verify template references are correct
3. Test individual actions separately
4. Check file and network permissions

### Output Links Broken

1. Verify repository was created successfully
2. Check GitHub integration is configured
3. Confirm paths in output section are correct
4. Test paths manually in filesystem

