## Environment Configuration Template

```yaml
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: environment-config
  title: Environment Configuration
  description: Create environment-specific configuration files
  tags:
    - configuration
    - devops
spec:
  owner: team-devops
  type: other
  parameters:
    - title: Environment Setup
      required:
        - environment
        - service_name
      properties:
        environment:
          title: Environment
          type: string
          enum:
            - development
            - staging
            - production
        service_name:
          title: Service Name
          type: string
        config_type:
          title: Configuration Type
          type: string
          enum:
            - ".env file"
            - "docker-compose"
            - "kubernetes"
            - "terraform"
  steps:
    - id: fetch-config
      name: Generate Configuration
      action: fetch:template
      input:
        url: ./templates/env-config/${{ parameters.environment }}
        values:
          service_name: ${{ parameters.service_name }}
          config_type: ${{ parameters.config_type }}
  output:
    links:
      - title: Configuration Files
        url: config/${{ parameters.environment }}/
```

