name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Stage 1: Code Quality
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install black ruff pylint

      - name: Check Black formatting
        run: black --check backend/ tests/

      - name: Run Ruff
        run: ruff check backend/ tests/ --output-format=github

      - name: Run Pylint
        run: pylint backend/ --fail-under=8.0 || true

  # Stage 2: Type Checking
  type-check:
    name: Type Checking (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-PyYAML types-requests
          pip install -r backend/requirements.txt -q

      - name: Run mypy
        run: mypy backend/ --ignore-missing-imports --check-untyped-defs

  # Stage 3: Unit Tests + Coverage
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lux_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/lux_test
          FASTAPI_SECRET_KEY: test-key-only
          GOOGLE_CLIENT_ID: test-id
          GOOGLE_CLIENT_SECRET: test-secret
          ADMIN_USER_EMAIL: admin@luxauto.test
          ENVIRONMENT: test
        run: |
          pytest tests/unit/ -v --cov=backend --cov-report=xml --cov-report=term --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests

  # Stage 4: Static Application Security Testing (SAST)
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit security scan
        run: bandit -r backend/ -f json -o bandit-report.json || true

      - name: Check Bandit findings
        run: |
          python -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          high = [m for m in data['results'] if m['severity'] == 'HIGH']
          if high:
              print(f'BANDIT FOUND {len(high)} HIGH SEVERITY ISSUES')
              for m in high:
                  print(f'  - {m[\"issue_text\"]} ({m[\"filename\"]}:{m[\"line_range\"]})')
              exit(1)
          else:
              print('No high-severity security issues found')
          "

  # Stage 5: Dependency Scanning
  dependencies:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan dependencies for vulnerabilities
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --format=markdown || true

  # Stage 6: Secrets Scanning
  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install trufflehog
        run: pip install trufflehog3

      - name: Scan for secrets
        run: |
          trufflehog3 . --no-history --format json 2>/dev/null | \
          python -c "
          import sys, json
          secrets = [json.loads(line) for line in sys.stdin if line.strip()]
          if secrets:
              print(f'FOUND {len(secrets)} POTENTIAL SECRETS')
              for s in secrets[:5]:
                  print(f'  - {s.get(\"reason\", \"unknown\")} at {s.get(\"path\", \"?\")}')
              exit(1)
          else:
              print('No secrets detected')
          " || true

  # Stage 7: Integration Tests
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lux_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/lux_test
          FASTAPI_SECRET_KEY: test-key-only
          GOOGLE_CLIENT_ID: test-id
          GOOGLE_CLIENT_SECRET: test-secret
          ADMIN_USER_EMAIL: admin@luxauto.test
          ENVIRONMENT: test
        run: pytest tests/integration/ -v

  # Stage 8: Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, sast, dependencies, secrets, integration]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG="${{ github.sha }}"
          echo "image=${IMAGE}:${TAG}" >> $GITHUB_OUTPUT

  # Stage 9: Container Scanning (Trivy)
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.build.outputs.image }}
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  # Final Stage: Summary
  summary:
    name: CI Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, sast, dependencies, secrets, integration, build, container-scan]
    if: always()
    steps:
      - name: Check pipeline status
        run: |
          echo "Pipeline execution complete"
          echo ""
          echo "Checks:"
          echo "  Lint & Format (black + ruff)"
          echo "  Type Checking (mypy)"
          echo "  Unit Tests (80%+ coverage)"
          echo "  SAST (Bandit)"
          echo "  Dependency Scan (pip-audit)"
          echo "  Secrets Scan (trufflehog3)"
          echo "  Integration Tests"
          echo "  Docker Build"
          echo "  Container Scan (Trivy)"
