name: Security & Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Daily security scan at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install bandit detect-secrets pip-audit safety

      - name: Scan for secrets (detect-secrets)
        run: |
          detect-secrets scan --baseline .secrets.baseline || true

      - name: Scan for credentials (pattern matching)
        run: bash scripts/scan-credentials.sh

      - name: Scan Python dependencies
        run: |
          echo "Scanning with pip-audit..."
          pip-audit --desc || true
          
          echo "Scanning with safety..."
          safety check || true

      - name: Static application security testing (SAST)
        run: |
          echo "Running Bandit..."
          bandit -r backend/ -ll --skip B008,B101 -f json -o bandit-report.json || true
          bandit -r backend/ -ll --skip B008,B101

      - name: Type checking
        run: |
          echo "Running mypy..."
          mypy backend/ --ignore-missing-imports --no-error-summary || true

      - name: Code quality analysis
        run: |
          echo "Running Pylint..."
          pylint backend/ --disable=all --enable=E,F --max-line-length=120 || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json
            .secrets.baseline
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔒 Security Scan Report\n\n';
            comment += '- ✓ Credential scanning completed\n';
            comment += '- ✓ Dependency vulnerability scanning completed\n';
            comment += '- ✓ SAST analysis completed\n';
            comment += '- ✓ Type checking completed\n';
            comment += '\nReview [artifacts](.${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for detailed reports.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
