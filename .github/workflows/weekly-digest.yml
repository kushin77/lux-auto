name: Weekly PMO Digest

on:
  schedule:
    # Every Monday at 8:00 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  issues: read

jobs:
  weekly-digest:
    name: Post weekly status to active epic
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate and post weekly digest
        uses: actions/github-script@v7
        with:
          script: |
            // Calculate date range
            const today = new Date();
            const lastWeek = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            const lastWeekISO = lastWeek.toISOString().split('T')[0];
            
            console.log(`Generating digest for period: ${lastWeekISO} to ${today.toISOString().split('T')[0]}`);
            
            // Get all issues by state
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            const closedThisWeek = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              since: lastWeekISO,
              per_page: 100
            });
            
            const inProgress = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'in-progress',
              per_page: 100
            });
            
            const blocked = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'blocked',
              per_page: 100
            });
            
            const ready = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ready',
              per_page: 100
            });
            
            // Count by phase
            const phase4Issues = openIssues.data.filter(i => 
              i.labels.some(l => l.name === 'phase-4')
            ).length;
            
            const phase5Issues = openIssues.data.filter(i => 
              i.labels.some(l => l.name === 'phase-5')
            ).length;
            
            const phase6Issues = openIssues.data.filter(i => 
              i.labels.some(l => l.name === 'phase-6')
            ).length;
            
            const criticalIssues = openIssues.data.filter(i => 
              i.labels.some(l => l.name === 'p0-critical')
            ).length;
            
            // Prepare digest message
            const digestMessage = `## 📊 Weekly PMO Digest
            
**Week of ${lastWeekISO}**

### 📈 Progress Metrics
| Metric | Count |
|--------|-------|
| Issues Open | ${openIssues.data.length} |
| Closed This Week | ${closedThisWeek.data.length} |
| Currently In Progress | ${inProgress.data.length} |
| Blocked | ${blocked.data.length} |
| Ready for Work | ${ready.data.length} |

### 🎯 By Phase
| Phase | Open Issues |
|-------|-------------|
| Phase 4 | ${phase4Issues} |
| Phase 5 | ${phase5Issues} |
| Phase 6 | ${phase6Issues} |

### 🚨 Alerts
- **P0 Critical:** ${criticalIssues} open items demand immediate attention

### 🔄 Blocked Items
${blocked.data.length > 0 ? 
  blocked.data.slice(0, 5).map(i => \`- #\${i.number}: \${i.title}\`).join('\\n') :
  'None — unblock others!'
}

### ✅ Recently Completed
${closedThisWeek.data.slice(0, 5).length > 0 ?
  closedThisWeek.data.slice(0, 5).map(i => \`- #\${i.number}: \${i.title}\`).join('\\n') :
  'No issues closed this week'
}

---
_Generated automatically on ${new Date().toISOString().split('T')[0]}_`;
            
            // Find active epic (highest number with epic label)
            const epics = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'epic',
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 1
            });
            
            if (epics.data.length > 0) {
              const activeEpic = epics.data[0];
              console.log(`Posting digest to epic #${activeEpic.number}`);
              
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: activeEpic.number,
                  body: digestMessage
                });
                
                console.log(`✅ Weekly digest posted to epic #${activeEpic.number}`);
              } catch (error) {
                console.log(`⚠️ Error posting digest: ${error.message}`);
              }
            } else {
              console.log('ℹ️ No open epic found — digest not posted');
            }
