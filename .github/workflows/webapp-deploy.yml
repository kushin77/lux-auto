name: Deploy Apps Script Web App

# Pushes webapp/ to Google Apps Script and cuts a new versioned deployment.
#
# ONE-TIME SETUP (run webapp/bootstrap-cloudshell.sh in Google Cloud Shell first):
#   Repo secret  CLASPRC_JSON   — contents of ~/.clasprc.json after clasp login
#   Repo secret  SCRIPT_ID      — the Apps Script project ID
#
# After those two secrets are set, every push to main that touches webapp/ auto-deploys.
# Until they are set, this workflow skips gracefully with a clear warning.

on:
  workflow_dispatch:          # manual trigger from GitHub UI
  push:
    branches: [main]
    paths:
      - "webapp/**"
      - ".github/workflows/webapp-deploy.yml"

concurrency:
  group: webapp-deploy
  cancel-in-progress: false   # never cancel a live clasp push

jobs:
  deploy:
    name: clasp push + deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: webapp/package.json

      - name: Install clasp
        working-directory: webapp
        run: npm ci

      # Guard: skip deploy if secrets not yet populated.
      # Run webapp/bootstrap-cloudshell.sh once to populate CLASPRC_JSON + SCRIPT_ID.
      - name: Check webapp secrets configured
        id: clasp_check
        run: |
          if [[ -z "$CLASPRC_JSON" ]] || [[ -z "$SCRIPT_ID" ]]; then
            echo "::warning::CLASPRC_JSON or SCRIPT_ID not set — webapp deploy skipped. Run: cd webapp && bash bootstrap-cloudshell.sh"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          SCRIPT_ID:    ${{ secrets.SCRIPT_ID }}

      # Write the OAuth token clasp needs. Use printf (not echo) to preserve JSON exactly.
      - name: Write clasp credentials
        if: steps.clasp_check.outputs.skip == 'false'
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          CREDS="$HOME/.clasprc.json"
          printf '%s' "$CLASPRC_JSON" > "$CREDS"
          chmod 600 "$CREDS"
          BYTES=$(wc -c < "$CREDS")
          echo "Credentials written: ${BYTES} bytes"
          test "$BYTES" -gt 10 || { echo "::error::CLASPRC_JSON is empty — re-run webapp/bootstrap-cloudshell.sh"; exit 1; }
          python3 -c "import json; d=json.load(open('$CREDS')); t=d if 'access_token' in d else d.get('tokens',d); assert t.get('access_token') or t.get('refresh_token'), 'No token in CLASPRC_JSON — re-run bootstrap-cloudshell.sh'; print('credentials OK')"

      # Inject the Script ID into .clasp.json (template kept in repo, never committed with real ID).
      - name: Inject Script ID
        if: steps.clasp_check.outputs.skip == 'false'
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        working-directory: webapp
        run: |
          sed "s/REPLACE_WITH_SCRIPT_ID/$SCRIPT_ID/" .clasp.json.template > .clasp.json
          echo "Script ID injected: $SCRIPT_ID"

      - name: Push source to Apps Script
        if: steps.clasp_check.outputs.skip == 'false'
        working-directory: webapp
        run: npx clasp push --force

      - name: Create versioned deployment
        if: steps.clasp_check.outputs.skip == 'false'
        working-directory: webapp
        run: |
          npx clasp deploy \
            --description "CI deploy — ${{ github.sha }} — $(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            || echo "⚠️  deploy step failed — source was pushed; create the deployment manually once."

      - name: Print web-app URL
        if: steps.clasp_check.outputs.skip == 'false'
        working-directory: webapp
        run: |
          echo "── Active deployments ──"
          npx clasp deployments || true
