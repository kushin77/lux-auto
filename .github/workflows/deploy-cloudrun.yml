name: Deploy to Cloud Run

# Deploys the FastAPI backend to Cloud Run.
# - Smoke tests MUST pass before any deploy step runs.
# - push to main (backend/** changed) → app-only (SQLite, public, for fast feedback)
# - workflow_dispatch → choose app-only OR production (Cloud SQL + private)
#
# ONE-TIME SETUP — run scripts/gcp-bootstrap.sh (sets up all GCP infra + auto-populates
# these secrets via gh CLI):
#   GCP_WIF_PROVIDER   — WIF provider resource name (keyless auth, no long-lived key)
#   GCP_DEPLOY_SA      — deploy service account email
#   GCP_PROJECT_ID     — GCP project id  (default: lux-auto)
#   GCP_REGION         — Cloud Run region (default: us-central1)
#   CLOUDSQL_CONN      — Cloud SQL connection name (production deploys only)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Deployment mode"
        type: choice
        options: [app-only, production]
        default: app-only
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Dockerfile.backend"
      - ".github/workflows/deploy-cloudrun.yml"

concurrency:
  group: cloudrun-deploy
  cancel-in-progress: false    # never cancel a live Cloud Run deploy

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'lux-auto' }}
  REGION:     ${{ secrets.GCP_REGION     || 'us-central1' }}
  SERVICE:    lux-auto-api
  PORT:       8080

jobs:
  # ── Job 1: smoke tests — must pass before any deploy ────────────────────────
  test:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run smoke tests
        run: pytest backend/tests/ -v --tb=short
        env:
          DATABASE_URL:       "sqlite:///./_smoke_test.db"
          FASTAPI_SECRET_KEY: "ci-test-secret"
          ADMIN_USER_EMAIL:   "admin@luxauto.test"
          ENVIRONMENT:        "test"

  # ── Job 2: deploy (only after tests pass) ────────────────────────────────────
  deploy:
    name: Deploy → Cloud Run
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP (WIF — keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      # Dockerfile.backend lives at the repo root; gcloud --source needs it as "Dockerfile"
      - name: Stage Dockerfile
        run: cp Dockerfile.backend Dockerfile

      # ── app-only: SQLite, public — fast feedback on every main push ───────────
      - name: Deploy (app-only / staging)
        if: github.event_name == 'push' || inputs.mode == 'app-only'
        run: |
          SECRET_KEY="$(openssl rand -base64 48)"
          ENVVARS="DATABASE_URL=sqlite:////tmp/lux.db,FASTAPI_SECRET_KEY=${SECRET_KEY},ADMIN_USER_EMAIL=akushnir@bioenergystrategies.com,ENVIRONMENT=staging,LOG_LEVEL=INFO"
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "$PROJECT_ID" \
            --region  "$REGION" \
            --port    "$PORT" \
            --allow-unauthenticated \
            --memory 512Mi --cpu 1 --min-instances 0 --max-instances 3 \
            --set-env-vars "$ENVVARS"

      # ── production: Cloud SQL + Secret Manager + private ─────────────────────
      - name: Deploy (production)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'production'
        env:
          CLOUDSQL_CONN: ${{ secrets.CLOUDSQL_CONN }}
        run: |
          ENVVARS="ADMIN_USER_EMAIL=akushnir@bioenergystrategies.com,ENVIRONMENT=production,LOG_LEVEL=INFO"
          SECRETS="DATABASE_URL=lux-auto-database-url:latest,FASTAPI_SECRET_KEY=lux-auto-secret-key:latest"
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "$PROJECT_ID" \
            --region  "$REGION" \
            --port    "$PORT" \
            --no-allow-unauthenticated \
            --add-cloudsql-instances "$CLOUDSQL_CONN" \
            --memory 1Gi --cpu 1 --min-instances 1 --max-instances 10 \
            --set-secrets  "$SECRETS" \
            --set-env-vars "$ENVVARS"

      # ── health check — verifies the deploy is actually serving ────────────────
      - name: Health check
        run: |
          URL="$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" \
            --format='value(status.url)')"
          echo "Service URL: $URL"
          # app-only is public; production requires an identity token
          if [[ "${{ inputs.mode }}" == "production" ]]; then
            TOKEN="$(gcloud auth print-identity-token)"
            curl -fsS -H "Authorization: Bearer $TOKEN" "$URL/health" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d); assert d['status']=='healthy'"
          else
            curl -fsS --retry 5 --retry-delay 5 "$URL/health" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d); assert d['status']=='healthy'"
          fi
          echo "✓ Health check passed"
