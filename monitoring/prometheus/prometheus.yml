# Prometheus Configuration
# Scrapes metrics from all services and evaluates alerting rules
#
# Deploy with:
#   docker run -d -p 9090:9090 \
#     -v $(pwd)/prometheus.yml:/etc/prometheus/prometheus.yml \
#     -v $(pwd)/alert_rules.yml:/etc/prometheus/alert_rules.yml \
#     prom/prometheus:latest

global:
  scrape_interval: 15s      # Scrape targets every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  external_labels:
    environment: 'production'
    team: 'platform'

# Load alerting rules
rule_files:
  - '/etc/prometheus/alert_rules.yml'

# AlertManager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'  # AlertManager service

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend API
  - job_name: 'backend-api'
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: '/metrics'
    scheme: 'http'
    static_configs:
      - targets:
          - 'backend:8000'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme
    # Drop internal metrics to reduce cardinality
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'go_.*'
        action: drop

  # PostgreSQL Database (via postgres_exporter)
  - job_name: 'postgres'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'postgres-exporter:9187'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [job]
        target_label: service
        replacement: 'postgresql'

  # Redis Cache (via redis_exporter)
  - job_name: 'redis'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'redis-exporter:9121'
    relabel_configs:
      - source_labels: [job]
        target_label: service
        replacement: 'redis'

  # Docker Daemon (via cAdvisor)
  - job_name: 'docker'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'cadvisor:8080'
    relabel_configs:
      - source_labels: [job]
        target_label: service
        replacement: 'container-metrics'

  # Kubernetes Cluster (if deployed to K8s)
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
      - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: 'default;kubernetes;https'

  # Node Exporter (if running on VMs)
  - job_name: 'node-exporter'
    scrape_interval: 60s
    static_configs:
      - targets:
          - 'node-exporter:9100'
    relabel_configs:
      - source_labels: [job]
        target_label: service
        replacement: 'system-metrics'

# Remote storage (optional - for long-term retention)
# Uncomment to enable:
# remote_write:
#   - url: 'http://storage-service:9009/api/v1/push'
#     write_relabel_configs:
#       - source_labels: [__name__]
#         regex: '(up|job_.*)'
#         action: keep

# Remote read (optional - for querying long-term storage)
# remote_read:
#   - url: 'http://storage-service:9009/api/v1/read'
