version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: lux-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-lux_prod}
      POSTGRES_USER: ${DATABASE_USER:-lux_admin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Database password required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./scripts/portal-schema.sql:/docker-entrypoint-initdb.d/002-portal-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-lux_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - lux-network

  # Redis Cache
  cache:
    image: redis:7-alpine
    container_name: lux-cache
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - lux-network

  # OAuth2 Proxy
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: lux-oauth2-proxy
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_GOOGLE_GROUPS_CACHE_TTL: 5m
      OAUTH2_PROXY_GOOGLE_SERVICE_ACCOUNT_JSON: /etc/oauth2-proxy/service-account.json
      OAUTH2_PROXY_CLIENT_ID: ${GOOGLE_CLIENT_ID:?Google OAuth client ID required}
      OAUTH2_PROXY_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?Google OAuth client secret required}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:?OAuth cookie secret required}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "Strict"
      OAUTH2_PROXY_COOKIE_EXPIRE: ${OAUTH2_PROXY_COOKIE_EXPIRE:-86400}
      OAUTH2_PROXY_COOKIE_REFRESH: ${OAUTH2_PROXY_COOKIE_REFRESH:-3600}
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: "http://fastapi:8000"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_REDIRECT_URL: "https://${DOMAIN:?Domain required}/oauth2/callback"
      OAUTH2_PROXY_PASS_BASIC_AUTH: "false"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_CUSTOM_SIGN_IN_LOGO: "https://www.gstatic.com/devrel-devsite/prod/v2210deb39920cd4a1bd580441aa58e7853afc04b39a9d9ac4198e1cd7fbe04ef/google/images/branding/product/1x/googleg_standard_color_128dp.png"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
    volumes:
      - ./config/service-account.json:/etc/oauth2-proxy/service-account.json:ro
    ports:
      - "4180:4180"
    networks:
      - lux-network
    restart: unless-stopped

  # FastAPI Application
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PYTHON_VERSION: "3.11"
    image: kushin77/lux-auto:latest
    container_name: lux-fastapi
    depends_on:
      postgres:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?Database URL required}
      FASTAPI_SECRET_KEY: ${FASTAPI_SECRET_KEY:?FastAPI secret key required}
      ADMIN_USER_EMAIL: ${ADMIN_USER_EMAIL:-akushnir@bioenergystrategies.com}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${FASTAPI_LOG_LEVEL:-INFO}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@cache:6379/0
    volumes:
      - ./backend:/app/backend:ro
      - ./tests:/app/tests:ro
    ports:
      - "8000:8000"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - lux-network
    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn backend.main:app --host 0.0.0.0 --port 8000
      "

  # Caddy Reverse Proxy with HTTPS
  caddy:
    image: caddy:2.7-alpine
    container_name: lux-caddy
    depends_on:
      oauth2-proxy:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN:?Domain required}
      ACME_EMAIL: ${ACME_EMAIL:?ACME email required}
      CADDY_ADMIN: "0.0.0.0:2019"
    volumes:
      - ./Caddyfile.tpl:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    networks:
      - lux-network
    restart: unless-stopped

  # Appsmith Portal
  appsmith:
    image: appsmith/appsmith:latest
    container_name: lux-appsmith
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APPSMITH_DB_NAME: appsmith_db
      APPSMITH_DB_USER: appsmith
      APPSMITH_DB_PASSWORD: ${APPSMITH_DB_PASSWORD:?Appsmith database password required}
      APPSMITH_PG_DBHOST: postgres
      APPSMITH_PG_PORT: 5432
      APPSMITH_OAUTH_ENABLED: "true"
      APPSMITH_OAUTH_DEFAULT_CODE_CHALLENGE_METHOD: "S256"
      APPSMITH_CUSTOM_DOMAIN: appsmith.${DOMAIN:?Domain required}
      APPSMITH_DISABLE_TELEMETRY: "true"
      APPSMITH_ENCRYPTION_PASSWORD: ${APPSMITH_ENCRYPTION_PASSWORD:?Appsmith encryption password required}
      APPSMITH_ENCRYPTION_SALT: ${APPSMITH_ENCRYPTION_SALT:?Appsmith encryption salt required}
    volumes:
      - appsmith_data:/appsmith-stacks
    ports:
      - "8080:80"
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - lux-network

  # Backstage Portal  
  backstage:
    image: backstage/backstage:latest
    container_name: lux-backstage
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BACKSTAGE_PG_DBNAME: backstage_db
      BACKSTAGE_PG_USER: backstage
      BACKSTAGE_PG_PASSWORD: ${BACKSTAGE_DB_PASSWORD:?Backstage database password required}
      BACKSTAGE_PG_HOST: postgres
      BACKSTAGE_PG_PORT: 5432
      BACKSTAGE_GITHUB_TOKEN: ${BACKSTAGE_GITHUB_TOKEN:?Backstage GitHub token required}
      BACKSTAGE_AUTH_GITHUB_CLIENT_ID: ${BACKSTAGE_GITHUB_CLIENT_ID:?Backstage GitHub client ID required}
      BACKSTAGE_AUTH_GITHUB_CLIENT_SECRET: ${BACKSTAGE_GITHUB_CLIENT_SECRET:?Backstage GitHub client secret required}
      BACKSTAGE_BASE_URL: https://backstage.${DOMAIN:?Domain required}
      BACKSTAGE_AUTH_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?Google client ID required}
      BACKSTAGE_AUTH_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?Google client secret required}
      NODE_ENV: production
      LOG_LEVEL: info
    volumes:
      - backstage_data:/backstage
    ports:
      - "3000:3000"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - lux-network

networks:
  lux-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  appsmith_data:
    driver: local
  backstage_data:
    driver: local
