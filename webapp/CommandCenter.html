<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<style>
  :root{
    --bg:#f1f3f4; --panel:#fff; --card:#fff; --line:#dadce0;
    --txt:#202124; --muted:#5f6368; --blue:#1a73e8; --blue-d:#1765cc;
    --green:#1e8e3e; --amber:#e37400; --red:#d93025; --gold:#b8860b;
    --shadow:0 1px 2px rgba(60,64,67,.18),0 1px 3px 1px rgba(60,64,67,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Google Sans",Roboto,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
       background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
  a{color:inherit}
  /* Top bar */
  .topbar{position:sticky;top:0;z-index:5;background:var(--panel);border-bottom:1px solid var(--line);
          display:flex;align-items:center;gap:12px;padding:12px 20px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:16px}
  .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#b8860b,#e8c766);
        color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
  .spacer{flex:1}
  .badge{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .badge.demo{color:var(--amber);border-color:#f4c89a;background:#fff7ed}
  .who{font-size:12px;color:var(--muted)}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--blue);font-weight:600;font-size:13px;
       padding:7px 14px;border-radius:8px;cursor:pointer}
  .btn:hover{background:#f8f9fa}
  .btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .btn.primary:hover{background:var(--blue-d)}
  /* Layout */
  .wrap{max-width:1280px;margin:0 auto;padding:18px 20px 48px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
  .kpi .n{font-size:26px;font-weight:700;line-height:1}
  .kpi .l{color:var(--muted);font-size:12.5px;margin-top:6px}
  .kpi.blue .n{color:var(--blue)} .kpi.gold .n{color:var(--gold)} .kpi.green .n{color:var(--green)}
  .flow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--panel);border:1px solid var(--line);
        border-radius:12px;padding:12px 16px;margin-bottom:18px;color:var(--muted);font-size:13px;box-shadow:var(--shadow)}
  .flow b{color:var(--txt)} .flow .arr{color:var(--blue)}
  .banner{display:none;background:#fce8e6;border:1px solid #f5c6c0;color:#a50e0e;border-radius:10px;
          padding:12px 16px;margin-bottom:16px;font-size:13.5px}
  /* Board */
  .board{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}
  .col{flex:0 0 260px;background:var(--panel);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;max-height:72vh}
  .col h3{margin:0;padding:12px 14px;font-size:13px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .col h3 .cnt{color:var(--muted);font-weight:500;font-size:12px}
  .col .body{padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
  .deal{border:1px solid var(--line);border-radius:10px;padding:12px;background:#fff;transition:.12s}
  .deal:hover{border-color:var(--blue);box-shadow:var(--shadow)}
  .deal .dt{font-weight:600;font-size:13.5px;margin-bottom:6px}
  .deal .meta{font-size:11.5px;color:var(--muted);line-height:1.5}
  .deal .row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .val{font-weight:700;font-size:13px}
  .score{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;color:#fff}
  .s-hi{background:var(--green)} .s-mid{background:var(--gold)} .s-lo{background:#9aa0a6}
  .vin{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10.5px;color:var(--muted)}
  .move{margin-top:8px;width:100%;font-size:11.5px;padding:5px;border:1px solid var(--line);border-radius:7px;color:var(--muted)}
  .empty{color:var(--muted);font-size:12px;text-align:center;padding:18px 8px}
  /* Buyers */
  .section{margin:26px 0 12px;font-size:12px;letter-spacing:1.1px;text-transform:uppercase;color:var(--muted)}
  .buyers{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .buyer{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
  .buyer .bn{font-weight:600;font-size:14px}
  .buyer .bm{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}
  footer{margin-top:28px;color:var(--muted);font-size:12px;border-top:1px solid var(--line);padding-top:16px}
  .loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px;padding:40px 0;justify-content:center}
  .spin{width:18px;height:18px;border:3px solid #dadce0;border-top-color:var(--blue);border-radius:50%;animation:r 1s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}
  @media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="logo">L</span> Lux Auto — Command Center</div>
    <span id="demoBadge" class="badge demo" style="display:none">Preview data</span>
    <div class="spacer"></div>
    <span id="who" class="who"></span>
    <button class="btn primary" onclick="load(true)">↻ Refresh</button>
  </div>

  <div class="wrap">
    <div id="banner" class="banner"></div>

    <div class="kpis">
      <div class="kpi blue"><div class="n" id="k_active">—</div><div class="l">Active deals</div></div>
      <div class="kpi gold"><div class="n" id="k_hot">—</div><div class="l">Hot deals (score ≥ 70)</div></div>
      <div class="kpi green"><div class="n" id="k_value">—</div><div class="l">Pipeline value</div></div>
      <div class="kpi"><div class="n" id="k_top">—</div><div class="l">Top deal score</div></div>
    </div>

    <div class="flow">
      <b>Scan</b><span class="arr">›</span><b>Score</b><span class="arr">›</span><b>Pipeline</b>
      <span class="arr">›</span><b>Match buyers</b><span class="arr">›</span><b>Acquire</b>
      <span class="arr">›</span><b>Recon</b><span class="arr">›</span><b>Sell</b>&nbsp;— one automated deal flow.
    </div>

    <div id="loading" class="loading"><span class="spin"></span> Loading deals…</div>
    <div id="board" class="board" style="display:none"></div>

    <div class="section">Buyers</div>
    <div id="buyers" class="buyers"></div>

    <footer>Lux Auto · Exotic Dealer Operations · <span id="ts"></span></footer>
  </div>

<script>
  var STATE = { user:{isAdmin:false}, stages:[] };

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function money(n){ n=Number(n||0); return n>=1000 ? '$'+(n/1000).toFixed(n%1000?1:0)+'K' : '$'+n.toLocaleString(); }
  function scoreClass(s){ return s>=80?'s-hi':(s>=70?'s-mid':'s-lo'); }

  function load(force){
    document.getElementById('loading').style.display='flex';
    document.getElementById('board').style.display='none';
    if(typeof google==='undefined' || !google.script || !google.script.run){
      // Not running inside Apps Script (e.g. local preview) — show a hint.
      return fail({message:'Open this through the deployed web app URL.'});
    }
    google.script.run.withSuccessHandler(render).withFailureHandler(fail).getDashboardData(!!force);
  }

  function fail(err){
    document.getElementById('loading').style.display='none';
    var b=document.getElementById('banner');
    var m=(err&&err.message)||'Something went wrong.';
    if(/ACCESS_DENIED/.test(m)) m='You don’t have access to this tool. Ask an admin to add your email.';
    b.textContent='⚠ '+m; b.style.display='block';
  }

  function render(data){
    document.getElementById('loading').style.display='none';
    STATE.user=data.user||{isAdmin:false}; STATE.stages=data.stages||[];
    document.getElementById('who').textContent=(data.user&&data.user.email)?(data.user.email+(data.user.isAdmin?' · admin':'')):'';
    document.getElementById('demoBadge').style.display=data.demo?'inline-block':'none';
    var b=document.getElementById('banner');
    if(data.error){ b.textContent='⚠ Couldn’t reach the data source — showing what we have. ('+esc(data.error)+')'; b.style.display='block'; }
    else b.style.display='none';

    var m=data.metrics||{};
    document.getElementById('k_active').textContent=m.activeDeals||0;
    document.getElementById('k_hot').textContent=m.hotDeals||0;
    document.getElementById('k_value').textContent=money(m.pipelineValue||0);
    document.getElementById('k_top').textContent=m.topScore||0;
    document.getElementById('ts').textContent='Updated '+new Date(data.generatedAt||Date.now()).toLocaleString();

    renderBoard(data.deals||[], data.stages||[]);
    renderBuyers(data.buyers||[]);
  }

  function renderBoard(deals, stages){
    var byStage={}; stages.forEach(function(s){ byStage[s]=[]; });
    deals.forEach(function(d){ (byStage[d.stage]=byStage[d.stage]||[]).push(d); });
    var html=stages.map(function(stage){
      var items=byStage[stage]||[];
      var cards=items.length?items.map(function(d){ return dealCard(d); }).join('')
                            :'<div class="empty">No deals</div>';
      return '<div class="col"><h3>'+esc(stage)+'<span class="cnt">'+items.length+'</span></h3>'
           + '<div class="body">'+cards+'</div></div>';
    }).join('');
    var board=document.getElementById('board');
    board.innerHTML=html; board.style.display='flex';
  }

  function dealCard(d){
    var mover='';
    if(STATE.user.isAdmin && !/^demo-/.test(d.id)){
      mover='<select class="move" onchange="moveDeal(\''+esc(d.id)+'\',this.value)">'
          + '<option value="">Move to…</option>'
          + STATE.stages.map(function(s){ return '<option'+(s===d.stage?' disabled':'')+'>'+esc(s)+'</option>'; }).join('')
          + '</select>';
    }
    var sub=[d.year||'', d.make||''].filter(Boolean).join(' ');
    return '<div class="deal">'
      + '<div class="dt">'+esc(d.title||d.fullName||'Deal')+'</div>'
      + '<div class="meta">'+esc(sub)+(d.vin?'<br><span class="vin">VIN '+esc(d.vin)+'</span>':'')+'</div>'
      + '<div class="row"><span class="val">'+money(d.value)+'</span>'
      + '<span class="score '+scoreClass(d.score)+'">'+ (d.score||0) +'</span></div>'
      + mover + '</div>';
  }

  function renderBuyers(buyers){
    var el=document.getElementById('buyers');
    if(!buyers.length){ el.innerHTML='<div class="empty">No buyers yet.</div>'; return; }
    el.innerHTML=buyers.map(function(b){
      var loc=[b.city,b.state].filter(Boolean).join(', ');
      return '<div class="buyer"><div class="bn">'+esc(b.name)+'</div>'
        + '<div class="bm">'+(b.makes?('Wants: '+esc(b.makes)+'<br>'):'')
        + (b.maxPrice?('Budget: '+money(b.maxPrice)+'<br>'):'')
        + (loc?esc(loc)+'<br>':'') + esc(b.email||'') + '</div></div>';
    }).join('');
  }

  function moveDeal(id, stage){
    if(!stage) return;
    google.script.run.withSuccessHandler(function(){ load(true); })
      .withFailureHandler(fail).moveDeal(id, stage);
  }

  load(false);
</script>
</body>
</html>
