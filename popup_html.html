<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Deal Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 320px; background: #0f0f11; color: #e2e2e4; font: 13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  header { padding: 14px 16px 10px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.02em; }
  .status { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #1a3a1a; color: #5eff8a; }
  .status.offline { background: #3a1a1a; color: #ff7070; }
  section { padding: 12px 16px; border-bottom: 1px solid #1a1a1e; }
  label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
  input[type=range] { width: 100%; accent-color: #7c6bf5; }
  .thresh-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .thresh-val { font-size: 12px; font-weight: 600; color: #b8b0ff; }
  .deal-list { max-height: 280px; overflow-y: auto; }
  .deal-card { padding: 8px 10px; background: #18181c; border-radius: 6px; margin-bottom: 6px; border: 1px solid #2a2a30; cursor: pointer; transition: border-color 0.15s; }
  .deal-card:hover { border-color: #444; }
  .deal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .deal-name { font-size: 12px; font-weight: 500; }
  .deal-score { font-size: 14px; font-weight: 700; }
  .deal-score.hot    { color: #5eff8a; }
  .deal-score.good   { color: #ffc84a; }
  .deal-score.watch  { color: #7ec8ff; }
  .deal-meta { font-size: 10px; color: #666; }
  .empty { padding: 24px 0; text-align: center; color: #444; font-size: 12px; }
  .scan-btn { display: block; width: 100%; padding: 9px; background: #7c6bf5; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 2px; }
  .scan-btn:hover { background: #6a59e0; }
  .scan-btn:disabled { background: #333; color: #555; cursor: default; }
  footer { padding: 10px 16px; font-size: 10px; color: #444; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>⚡ Manheim Deal Finder</h1>
  <span class="status" id="status">Connecting…</span>
</header>

<section>
  <div class="thresh-row">
    <label style="margin:0">Min deal score</label>
    <span class="thresh-val" id="thresh-val">40</span>
  </div>
  <input type="range" id="thresh" min="0" max="100" value="40">
</section>

<section style="padding-bottom:8px">
  <label style="margin-bottom:6px">Recent deals</label>
  <div class="deal-list" id="deal-list">
    <div class="empty">No deals yet — run a scan</div>
  </div>
</section>

<section>
  <button class="scan-btn" id="scan-btn">Run scan now</button>
</section>

<footer>Auto-scans every 30 min · localhost:8000</footer>

<script>
const BACKEND = "http://localhost:8000";

async function checkBackend() {
  try {
    await fetch(`${BACKEND}/deals?limit=1`);
    document.getElementById("status").textContent = "Online";
    document.getElementById("status").classList.remove("offline");
  } catch {
    document.getElementById("status").textContent = "Offline";
    document.getElementById("status").classList.add("offline");
  }
}

async function loadDeals() {
  const { threshold } = await chrome.storage.sync.get({ threshold: 40 });
  try {
    const res = await fetch(`${BACKEND}/deals?min_score=${threshold}&limit=20`);
    const { deals } = await res.json();
    const list = document.getElementById("deal-list");
    if (!deals.length) {
      list.innerHTML = '<div class="empty">No deals above threshold</div>';
      return;
    }
    list.innerHTML = deals.map(d => {
      const cls = d.deal_score >= 80 ? "hot" : d.deal_score >= 60 ? "good" : "watch";
      return `
        <div class="deal-card">
          <div class="deal-top">
            <span class="deal-name">${d.year || ''} ${d.make || ''} ${d.model || ''}</span>
            <span class="deal-score ${cls}">${d.deal_score?.toFixed(0)}</span>
          </div>
          <div class="deal-meta">
            ${d.mileage ? d.mileage.toLocaleString() + ' mi' : ''} ·
            $${d.listing_price?.toLocaleString() || '—'} list ·
            ${d.discount_pct ? (d.discount_pct * 100).toFixed(1) + '% below MMR' : ''} ·
            Est. $${d.estimated_profit_margin?.toLocaleString() || '—'} net
          </div>
        </div>`;
    }).join("");
  } catch { /* offline */ }
}

// Threshold slider
const slider = document.getElementById("thresh");
const threshVal = document.getElementById("thresh-val");
chrome.storage.sync.get({ threshold: 40 }, ({ threshold }) => {
  slider.value = threshold;
  threshVal.textContent = threshold;
});
slider.addEventListener("input", () => {
  const v = parseInt(slider.value);
  threshVal.textContent = v;
  chrome.runtime.sendMessage({ type: "SET_THRESHOLD", value: v });
  loadDeals();
});

// Scan button
document.getElementById("scan-btn").addEventListener("click", async (e) => {
  const btn = e.target;
  btn.disabled = true;
  btn.textContent = "Scanning…";
  try {
    await fetch(`${BACKEND}/scan`, { method: "POST" });
    setTimeout(() => { loadDeals(); btn.disabled = false; btn.textContent = "Run scan now"; }, 3000);
  } catch {
    btn.disabled = false;
    btn.textContent = "Run scan now";
  }
});

checkBackend();
loadDeals();
</script>
</body>
</html>
